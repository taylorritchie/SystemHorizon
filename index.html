<!DOCTYPE html>
<html lang="en">
<head>

  <style>

    :root{
      --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      --color-background-primary:#fff;
      --color-background-secondary:#f8fafc;
      --color-background-info:#eff6ff;
      --color-background-success:#f0fdf4;
      --color-background-warning:#fffbeb;
      --color-background-danger:#fef2f2;
      --color-text-primary:#1e293b;
      --color-text-secondary:#64748b;
      --color-text-info:#1e40af;
      --color-text-success:#14532d;
      --color-text-warning:#92400e;
      --color-text-danger:#991b1b;

      --border-radius-lg:12px;

async function sGet(table){try{const r=await fetch(SURL+"/rest/v1/"+table+"?select=*",{headers:sh()});return r.ok?await r.json():[];}catch{return[];}}

const evToR=e=>({id:e.id,title:e.title,date:e.date,start_time:e.startTime,end_time:e.endTime,category:e.category,notes:e.notes||null,created_at:e.createdAt||new Date().toISOString()});

// ── Primitives ────────────────────────────────────────────────────
function Pill({bg,fg,xs,children}){return<span style={{display:"inline-block",whiteSpace:"nowrap",fontSize:xs?10:11,fontWeight:500,padding:xs?"1px 6px":"2px 8px",borderRadius:20,background:bg,color:fg}}>{children}</span>;}
function SL({children,color}){return<div style={{fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:color||"#64748b",marginBottom:10}}>{children}</div>;}
function Card({children,style,accent}){return<div style={{background:"#fff",border:accent?"1px solid "+accent+"22":"0.5px solid #e2e8f0",borderTop:accent?"3px solid "+accent:undefined,borderRadius:14,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,0.04)",...style}}>{children}</div>;}
function Sel({value,onChange,opts,style}){return<div style={{position:"relative",...style}}><select value={value} onChange={e=>onChange(e.target.value)} style={{appearance:"none",width:"100%",border:"0.5px solid #e2e8f0",borderRadius:8,padding:"5px 24px 5px 10px",fontSize:12,color:"#475569",background:"#f8fafc",cursor:"pointer",fontFamily:"var(--font-sans)"}}>{opts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}</select><div style={{position:"absolute",right:7,top:"50%",transform:"translateY(-50%)",fontSize:10,color:"#94a3b8",pointerEvents:"none"}}>▾</div></div>;}

// ── Task Card ─────────────────────────────────────────────────────
function TaskCard({task,onStatus,onDelete,compact}){
  const [open,setOpen]=useState(false);
  const [conf,setConf]=useState(false);
  const c=cat(task.category),p=prio(task.priority),done=task.status==="Done";
  return(
    <div style={{background:"#fff",border:task.status==="Today"?"1.5px solid "+B:done?"0.5px solid #dcfce7":"0.5px solid #e8edf2",borderRadius:10,padding:compact?"7px 10px":"9px 11px",marginBottom:5,opacity:done?0.6:1}}>
      <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
        <button onClick={()=>onStatus(task.id,done?"Open":"Done")} style={{width:17,height:17,borderRadius:"50%",border:"1.5px solid "+(done?GR:p.dot),background:done?GR:"none",cursor:"pointer",flexShrink:0,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff",padding:0}}>{done?"✓":""}</button>
        <div style={{flex:1,minWidth:0}}>
          <div onClick={()=>setOpen(!open)} style={{fontSize:compact?12:13,fontWeight:500,color:"#1e293b",cursor:"pointer",lineHeight:1.35,textDecoration:done?"line-through":"none"}}>{task.name}</div>
          {!compact&&<div style={{display:"flex",gap:4,marginTop:3,flexWrap:"wrap"}}><Pill bg={p.bg} fg={p.fg} xs>{p.l}</Pill><Pill bg={c.bg} fg={c.fg} xs>{c.l}</Pill>{task.status==="Waiting"&&<Pill bg="#fffbeb" fg="#92400e" xs>Waiting</Pill>}</div>}
          {open&&<div style={{marginTop:6,paddingTop:6,borderTop:"0.5px solid #f1f5f9"}}>
            {task.notes&&<div style={{fontSize:11,color:"#64748b",marginBottom:5,lineHeight:1.5}}>{task.notes}</div>}
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {task.status!=="Today"&&!done&&<button onClick={()=>onStatus(task.id,"Today")} style={{fontSize:10,padding:"2px 7px"}}>Today</button>}
              {task.status==="Today"&&<button onClick={()=>onStatus(task.id,"Open")} style={{fontSize:10,padding:"2px 7px"}}>Inbox</button>}
              {task.status!=="Waiting"&&!done&&<button onClick={()=>onStatus(task.id,"Waiting")} style={{fontSize:10,padding:"2px 7px"}}>Waiting</button>}
              {task.status==="Waiting"&&<button onClick={()=>onStatus(task.id,"Open")} style={{fontSize:10,padding:"2px 7px"}}>Unblock</button>}
              {!done&&<button onClick={()=>onStatus(task.id,"Done")} style={{fontSize:10,padding:"2px 7px",color:GR}}>Done</button>}
              {!conf?<button onClick={()=>setConf(true)} style={{fontSize:10,padding:"2px 7px",color:"#dc2626"}}>Del</button>:<><button onClick={()=>onDelete(task.id)} style={{fontSize:10,padding:"2px 7px",color:"#dc2626",fontWeight:600}}>Confirm?</button><button onClick={()=>setConf(false)} style={{fontSize:10,padding:"2px 7px"}}>No</button></>}
            </div>
          </div>}
        </div>
      </div>
    </div>
  );
}

// ── Create Form ───────────────────────────────────────────────────

        <button onClick={go} style={{background:"#f1f5f9",color:"#334155",border:"0.5px solid #e2e8f0",borderRadius:8,padding:"6px 16px",fontSize:13,fontWeight:500,cursor:"pointer",marginLeft:12}}>Create</button>

        <div style={{position:"relative",flex:1,minWidth:140}}><select value={cat} onChange={e=>setCat(e.target.value)} style={{...selStyle,width:"100%"}}>{CATS.map(c=><option key={c.id} value={c.id}>{c.l}</option>)}</select><span style={{position:"absolute",right:7,top:"50%",transform:"translateY(-50%)",fontSize:10,color:"#94a3b8",pointerEvents:"none"}}>▾</span></div>
        <div style={{position:"relative"}}><select value={st} onChange={e=>setSt(e.target.value)} style={selStyle}>{["Open","Today","Waiting"].map(s=><option key={s} value={s}>{s}</option>)}</select><span style={{position:"absolute",right:7,top:"50%",transform:"translateY(-50%)",fontSize:10,color:"#94a3b8",pointerEvents:"none"}}>▾</span></div>
        {projects&&projects.length>0&&<div style={{position:"relative"}}><select value={pid} onChange={e=>setPid(e.target.value)} style={selStyle}><option value="">No project</option>{projects.filter(p=>p.status!=="closed").map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select><span style={{position:"absolute",right:7,top:"50%",transform:"translateY(-50%)",fontSize:10,color:"#94a3b8",pointerEvents:"none"}}>▾</span></div>}

// ── Pain Heatmap ──────────────────────────────────────────────────
function PainMap({log}){
  const W=18,byDate={};
  log.forEach(e=>{byDate[e.date]=e.level;});
  const today=new Date();today.setHours(0,0,0,0);
  const start=new Date(today);start.setDate(start.getDate()-W*7+1-start.getDay());
  const weeks=[],cur=new Date(start);
  for(let w=0;w<W;w++){const wk=[];for(let d=0;d<7;d++){const ds=cur.toISOString().slice(0,10);wk.push({date:ds,level:cur>today?-1:(byDate[ds]??0)});cur.setDate(cur.getDate()+1);}weeks.push(wk);}
  const mls=[];
  weeks.forEach((wk,wi)=>{const d=new Date(wk[0].date+"T12:00:00");if(wi===0||d.getDate()<=7)mls.push({wi,l:d.toLocaleDateString("en-US",{month:"short"})});});
  const avg=log.length>0?(log.reduce((s,e)=>s+e.level,0)/log.length).toFixed(1):"—";
  const l30=log.filter(e=>new Date(e.date)>=new Date(Date.now()-30*86400000));
  const a30=l30.length>0?(l30.reduce((s,e)=>s+e.level,0)/l30.length).toFixed(1):"—";
  const te=log.find(e=>e.date===tds());
  return(
    <div>
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        {[{l:"Today",v:te?te.level+"/10":"—",bg:te?PC[te.level]:"#f1f5f9",fg:te?pfg(te.level):"#64748b"},{l:"Avg 30d",v:a30,bg:"#f8fafc",fg:"#334155"},{l:"All time",v:avg,bg:"#f8fafc",fg:"#334155"},{l:"Entries",v:log.length,bg:"#f8fafc",fg:"#334155"}].map(s=>(
          <div key={s.l} style={{background:s.bg,border:"0.5px solid #e2e8f0",borderRadius:12,padding:"10px 14px",minWidth:76,textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:600,color:s.fg}}>{s.v}</div>
            <div style={{fontSize:10,color:"#64748b",marginTop:2}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div style={{overflowX:"auto"}}>
        <div style={{minWidth:W*16+36}}>
          <div style={{display:"flex",marginLeft:30,marginBottom:3}}>
            {weeks.map((wk,wi)=>{const ml=mls.find(m=>m.wi===wi);return<div key={wi} style={{width:13,marginRight:2,flexShrink:0,fontSize:9,color:"#94a3b8"}}>{ml?ml.l:""}</div>;})}
          </div>
          {[0,1,2,3,4,5,6].map(di=>(
            <div key={di} style={{display:"flex",alignItems:"center",marginBottom:2}}>
              <div style={{width:26,fontSize:9,color:"#94a3b8",textAlign:"right",marginRight:4,flexShrink:0}}>{[0,2,4,6].includes(di)?["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][di]:""}</div>
              {weeks.map((wk,wi)=>{
                const cell=wk[di];
                const isT=cell.date===tds();
                const bg=cell.level===-1?"transparent":PC[cell.level];
                const op=cell.level===-1?0:1;
                const tip=cell.level>0?(cell.date+": "+cell.level+"/10 "+PL[cell.level]):(cell.date+": none");
                return<div key={wi} title={tip} style={{width:12,height:12,borderRadius:2,flexShrink:0,marginRight:2,background:bg,outline:isT?"2px solid "+B:undefined,outlineOffset:1,opacity:op}}/>;
              })}
            </div>
          ))}
          <div style={{display:"flex",gap:4,marginTop:8,marginLeft:30,alignItems:"center"}}>
            <span style={{fontSize:9,color:"#94a3b8"}}>Less</span>
            {[0,2,4,6,8,10].map(l=><div key={l} style={{width:11,height:11,borderRadius:2,background:PC[l]}}/>)}
            <span style={{fontSize:9,color:"#94a3b8"}}>More</span>
          </div>
        </div>
      </div>
    </div>
  );
}

      <div><label style={lbl}>Status</label><div style={{position:"relative"}}><select value={status} onChange={e=>setStatus(e.target.value)} style={selStyle}>{PST.map(s=><option key={s.id} value={s.id}>{s.l}</option>)}</select><span style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",fontSize:10,color:"#94a3b8",pointerEvents:"none"}}>▾</span></div></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

        <div><label style={lbl}>Due Date</label><input type="date" value={dd} onChange={e=>setDd(e.target.value)} style={inp}/></div>
      </div>
      <div><label style={lbl}>Priority</label><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{PRIOS.map(p=><button key={p.id} onClick={()=>setPr(p.id)} style={{padding:"4px 11px",borderRadius:20,fontSize:12,fontWeight:500,border:"1.5px solid "+(pr===p.id?p.dot:"#e2e8f0"),background:pr===p.id?p.bg:"#fff",color:pr===p.id?p.fg:"#64748b",cursor:"pointer"}}>{p.l}</button>)}</div></div>
      <div style={{flex:1}}/>

      </div>
    </div>
  );
}

              <div style={{marginBottom:12}}><label style={lbl}>Due Date</label><input type="date" value={e.dueDate||""} onChange={ev=>setE({...e,dueDate:ev.target.value})} onBlur={save} style={inp}/></div>
              <div style={{gridRow:"span 2",marginBottom:12}}><label style={lbl}>Description</label><textarea value={e.description||""} onChange={ev=>setE({...e,description:ev.target.value})} onBlur={save} style={{...inp,resize:"none",lineHeight:1.5,height:90}}/></div>
              <div style={{marginBottom:12}}><label style={lbl}>Start Date</label><input type="date" value={e.startDate||""} onChange={ev=>setE({...e,startDate:ev.target.value})} onBlur={save} style={inp}/></div>

}

// ── Projects View ─────────────────────────────────────────────────
function ProjView({projects,tasks,onSave,onUpdate,onStatus,onDelete,onAddTask}){
  const [sub,setSub]=useState("list");
  const [selId,setSelId]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const [tab,setTab]=useState("open");
  const [fa,setFa]=useState("all");

  const closed=projects.filter(p=>p.status==="closed");
  const display=(tab==="open"?open:closed).filter(p=>fa==="all"||p.area===fa);
  const tc=id=>tasks.filter(t=>t.projectId===id&&!["Done","Cancelled"].includes(t.status)).length;
  if(sub==="detail"&&selId){const pr=projects.find(p=>p.id===selId);if(pr)return<ProjDetail proj={pr} tasks={tasks} onBack={()=>setSub("list")} onUpdate={onUpdate} onStatus={onStatus} onDelete={onDelete} onAddTask={onAddTask}/>;}

    <div style={{display:"flex",minHeight:"100vh",background:"#f8fafc"}}>
      <div style={{flex:1,minWidth:0}}>

          <span style={{fontSize:19,fontWeight:500,color:"#1e293b"}}>Projects</span>
          <span style={{fontSize:13,color:"#94a3b8"}}>{sd()}</span>
        </div>
        <div style={{padding:"18px 20px"}}>
          <div style={{display:"flex",gap:10,marginBottom:16}}>
            {[{id:"open",l:"Open Projects",c:open.length,col:B,bg:"#eff6ff"},{id:"closed",l:"Closed Projects",c:closed.length,col:GR,bg:"#f0fdf4"}].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:tab===t.id?t.bg:"#fff",border:tab===t.id?"2px solid "+t.col+"22":"0.5px solid #e2e8f0",borderRadius:12,padding:"14px 18px",cursor:"pointer",textAlign:"left"}}>
                <div style={{fontSize:26,fontWeight:600,color:tab===t.id?t.col:"#334155"}}>{t.c}</div>
                <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{t.l}</div>
              </button>
            ))}
          </div>
          <Card style={{padding:0,overflow:"hidden"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",borderBottom:"0.5px solid #f1f5f9",flexWrap:"wrap",gap:8}}>
              <span style={{fontSize:14,fontWeight:500,color:"#1e293b"}}>Projects List</span>

                <button onClick={()=>setShowNew(!showNew)} style={{background:B,color:"#fff",border:"none",borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:500,cursor:"pointer"}}>+ Create Project</button>
              </div>
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr style={{background:"#f8fafc",borderBottom:"0.5px solid #e2e8f0"}}>
                  {["Project","Area","Status","Priority","Start Date","Due Date","Tasks"].map(h=><th key={h} style={{textAlign:"left",padding:"8px 10px",fontSize:11,fontWeight:600,color:"#94a3b8",whiteSpace:"nowrap",letterSpacing:"0.05em"}}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {display.length===0?<tr><td colSpan={7} style={{textAlign:"center",padding:"2.5rem",color:"#94a3b8",fontSize:13}}>No {tab} projects. <span style={{color:B,cursor:"pointer"}} onClick={()=>setShowNew(true)}>Create one →</span></td></tr>:display.map(p=>{
                    const c=cat(p.area),ps=pst(p.status),pr=prio(p.priority);
                    return<tr key={p.id} onClick={()=>{setSelId(p.id);setSub("detail");}} style={{borderBottom:"0.5px solid #f8fafc",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background=""}>
                      <td style={{padding:"11px 10px"}}><span style={{fontSize:13,fontWeight:500,color:B}}>{p.name}</span></td>
                      <td style={{padding:"11px 10px"}}><Pill bg={c.bg} fg={c.fg} xs>{c.l}</Pill></td>
                      <td style={{padding:"11px 10px"}}><Pill bg={ps.bg} fg={ps.fg} xs>{ps.l}</Pill></td>
                      <td style={{padding:"11px 10px"}}><Pill bg={pr.bg} fg={pr.fg} xs>{pr.l}</Pill></td>
                      <td style={{padding:"11px 10px",fontSize:12,color:"#64748b"}}>{fmt(p.startDate)}</td>

                      <td style={{padding:"11px 10px"}}><span style={{fontSize:12,fontWeight:500,color:tc(p.id)>0?B:"#94a3b8"}}>{tc(p.id)}</span></td>
                    </tr>;
                  })}

              </table>
            </div>
          </Card>
        </div>
      </div>
      {showNew&&<NewProjPanel onSave={p=>{onSave(p);setShowNew(false);}} onCancel={()=>setShowNew(false)}/>}
    </div>
  );
}

// ── Home View ─────────────────────────────────────────────────────
function HomeView({tasks,projects,streak,energy,setEnergy,painLog,onLogPain,onStatus,onDelete,onAdd}){

  const now=new Date(),d0=new Date(now);d0.setHours(0,0,0,0);
  const dw=new Date(d0);dw.setDate(dw.getDate()-dw.getDay());
  const dm=new Date(d0.getFullYear(),d0.getMonth(),1);
  const dToday=tasks.filter(t=>t.status==="Done"&&t.completedAt&&new Date(t.completedAt)>=d0);
  const dWeek=tasks.filter(t=>t.status==="Done"&&t.completedAt&&new Date(t.completedAt)>=dw);
  const dMonth=tasks.filter(t=>t.status==="Done"&&t.completedAt&&new Date(t.completedAt)>=dm);
  const eL=ENERGY.find(e=>e.id===energy);

  const byCat={};allA.forEach(t=>{if(!byCat[t.category])byCat[t.category]=[];byCat[t.category].push(t);});
  const groups=Object.entries(byCat).sort((a,b)=>b[1].length-a[1].length).slice(0,5);
  const tp=painLog.find(e=>e.date===tds());
  const kpis=[
    {l:"Men's Shelter",v:"6/16",c:B,bg:"#eff6ff"},{l:"Women's Shelter",v:"7/12",c:B,bg:"#eff6ff"},
    {l:"Open Tasks",v:openT.length,c:"#334155",bg:"#f8fafc"},
    {l:"Today Focus",v:todayT.length+"/5",c:todayT.length>=5?"#dc2626":GR,bg:todayT.length>=5?"#fef2f2":"#f0fdf4"},
    {l:"Active Projects",v:projects.filter(p=>p.status!=="closed").length,c:"#7c3aed",bg:"#f5f3ff"},

          <div style={{display:"grid",gridTemplateColumns:"54px repeat(7,1fr)",minWidth:560}}>
            <div style={{background:"#fff",borderBottom:"0.5px solid #e2e8f0"}}/>
            {wDays.map((d,i)=>{const ds=d.toISOString().slice(0,10),isT=ds===tStr;return<div key={i} style={{background:"#fff",borderBottom:"0.5px solid #e2e8f0",borderLeft:"0.5px solid #f1f5f9",padding:"8px 4px",textAlign:"center"}}><div style={{fontSize:10,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em"}}>{DNS[d.getDay()]}</div><div style={{width:26,height:26,borderRadius:"50%",background:isT?B:"none",display:"flex",alignItems:"center",justifyContent:"center",margin:"3px auto 0",fontSize:13,fontWeight:isT?600:400,color:isT?"#fff":"#334155"}}>{d.getDate()}</div></div>;})}
            {HRS.map(h=>[
              <div key={"h"+h} style={{background:"#fff",borderBottom:"0.5px solid #f8fafc",padding:"0 6px",height:48,display:"flex",alignItems:"flex-start",paddingTop:3,flexShrink:0}}><span style={{fontSize:10,color:"#94a3b8",whiteSpace:"nowrap"}}>{hhmm(h)}</span></div>,
              ...wDays.map((d,di)=>{
                const ds=d.toISOString().slice(0,10);
                const devs=evFD(ds).filter(e=>parseInt(e.startTime)===h);
                return<div key={"c"+h+di} onClick={()=>setAddSlot({date:ds,hour:h})} style={{height:48,borderLeft:"0.5px solid #f1f5f9",borderBottom:"0.5px solid #f8fafc",background:"#fff",cursor:"pointer",padding:"2px 3px"}} onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                  {devs.map(ev=><div key={ev.id} onClick={e=>{e.stopPropagation();setSelEv(ev);}} style={{background:evC(ev.category)+"20",border:"1.5px solid "+evC(ev.category),borderRadius:5,padding:"1px 5px",fontSize:10,fontWeight:600,color:evC(ev.category),cursor:"pointer",marginBottom:1,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{ev.startTime} {ev.title}</div>)}
                </div>;
              })
            ])}
          </div>
        </div>
        {addSlot&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.2)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}><AddEvForm slot={addSlot} onSave={e=>{onAddEv(e);setAddSlot(null);}} onCancel={()=>setAddSlot(null)}/></div>}
        {selEv&&<EvModal ev={selEv} onClose={()=>setSelEv(null)} onDel={onDelEv}/>}
      </div>
    );
  }

  // Month view
  const cells=[];
  for(let i=0;i<mFirst;i++)cells.push(null);
  for(let d=1;d<=mTotal;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  const wks=[];
  for(let i=0;i<cells.length;i+=7)wks.push(cells.slice(i,i+7));
  return(
    <div style={{background:"#f8fafc",minHeight:"100vh"}}>
      {header}
      <div style={{padding:"14px 16px"}}>
        <div style={{background:"#fff",borderRadius:14,border:"0.5px solid #e2e8f0",overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:"0.5px solid #f1f5f9"}}>
            {DNS.map(d=><div key={d} style={{padding:"10px 4px",textAlign:"center",fontSize:10,fontWeight:700,color:"#94a3b8",letterSpacing:"0.06em",textTransform:"uppercase"}}>{d}</div>)}
          </div>
          {wks.map((wk,wi)=>(
            <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
              {wk.map((day,di)=>{
                if(!day)return<div key={di} style={{borderRight:"0.5px solid #f8fafc",borderBottom:"0.5px solid #f8fafc",minHeight:88,background:"#fafafa"}}/>;
                const ds=mYear+"-"+String(mMo+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
                const devs=evFD(ds);
                const isT=ds===tStr;
                return<div key={di} onClick={()=>setAddSlot({date:ds})} style={{borderRight:"0.5px solid #f1f5f9",borderBottom:"0.5px solid #f1f5f9",minHeight:88,padding:"5px 5px 3px",cursor:"pointer",background:"#fff"}} onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                  <div style={{width:22,height:22,borderRadius:"50%",background:isT?B:"none",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:isT?600:400,color:isT?"#fff":"#475569",marginBottom:3}}>{day}</div>
                  {devs.slice(0,3).map(ev=><div key={ev.id} onClick={e=>{e.stopPropagation();setSelEv(ev);}} style={{fontSize:10,fontWeight:500,background:evC(ev.category)+"20",color:evC(ev.category),borderRadius:4,padding:"1px 5px",marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ev.startTime} {ev.title}</div>)}
                  {devs.length>3&&<div style={{fontSize:9,color:"#94a3b8"}}>+{devs.length-3}</div>}
                </div>;
              })}
            </div>
          ))}
        </div>
      </div>
      {addSlot&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.2)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}}><AddEvForm slot={addSlot} onSave={e=>{onAddEv(e);setAddSlot(null);}} onCancel={()=>setAddSlot(null)}/></div>}
      {selEv&&<EvModal ev={selEv} onClose={()=>setSelEv(null)} onDel={onDelEv}/>}
    </div>
  );
}

function PlaceView({label}){return<div style={{padding:"60px 26px",textAlign:"center"}}><div style={{fontSize:30,color:"#e2e8f0",marginBottom:8}}>◻</div><div style={{fontSize:15,fontWeight:500,color:"#334155",marginBottom:5}}>{label}</div><div style={{fontSize:13,color:"#94a3b8"}}>Coming soon</div></div>;}

// ── App ───────────────────────────────────────────────────────────
function App(){
  const [tasks,setTasks]=useState([]);
  const [streak,setStreak]=useState({count:0,lastDate:null,total:0});
  const [painLog,setPainLog]=useState([]);
  const [projects,setProjects]=useState([]);
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState("home");
  const [energy,setEnergy]=useState("all");

  useEffect(()=>{
    Promise.all([sGet('tasks'),sGet('projects'),sGet('pain_log'),sGet('calendar_events'),sGet('streak')]).then(([tr,pr,plr,evr,sr])=>{
      setTasks(tr.map(tFrR));
      setProjects(pr.map(pFrR));
      setPainLog(plr.map(plFrR));
      setCalEvents(evr.map(evFrR));
      const s=sr[0]||{count:0,last_date:null,total:0};
      setStreak({count:s.count||0,lastDate:s.last_date,total:s.total||0});
      setLoading(false);
    });
  },[]);

  const addTask=f=>{const t={id:uid(),...f,createdAt:new Date().toISOString(),completedAt:null};setTasks(prev=>[t,...prev]);sUpsert('tasks',tToR(t));};
  const updStatus=(id,status)=>{let ns=streak,ut;const u=tasks.map(t=>{if(t.id!==id)return t;if(status==="Done"&&t.status!=="Done")ns=bumpS(streak);ut={...t,status,completedAt:status==="Done"?new Date().toISOString():t.completedAt};return ut;});setTasks(u);if(ut)sUpsert('tasks',tToR(ut));if(ns!==streak){setStreak(ns);sUpsert('streak',{id:1,count:ns.count,last_date:ns.lastDate,total:ns.total});}};
  const delTask=id=>{setTasks(prev=>prev.filter(t=>t.id!==id));sDel('tasks','id',id);};
  const logPain=level=>{const d=tds(),entry={date:d,level,ts:new Date().toISOString()};setPainLog(prev=>{const i=prev.findIndex(e=>e.date===d);return i>=0?prev.map((e,j)=>j===i?entry:e):[...prev,entry];});sUpsert('pain_log',plToR(entry));};
  const addCalEv=ev=>{setCalEvents(prev=>[...prev,ev]);sUpsert('calendar_events',evToR(ev));};
  const delCalEv=id=>{setCalEvents(prev=>prev.filter(e=>e.id!==id));sDel('calendar_events','id',id);};
  const saveProj=p=>{setProjects(prev=>[...prev,p]);sUpsert('projects',pToR(p));};
  const updProj=p=>{setProjects(prev=>prev.map(pr=>pr.id===p.id?p:pr));sUpsert('projects',pToR(p));};

  if(loading)return<div style={{padding:"3rem",textAlign:"center",fontSize:14,color:"#94a3b8",fontFamily:"var(--font-sans)"}}>Loading control panel…</div>;

  const activeProj=projects.filter(p=>p.status!=="closed");
  const vLabel=NAV.find(([,id])=>id===view)?.[0]||view;

  return(
    <div style={{display:"flex",fontFamily:"var(--font-sans)",background:"#f8fafc",minHeight:"100vh"}}>
      <div style={{width:200,flexShrink:0,background:B,display:"flex",flexDirection:"column",padding:"16px 9px 14px",position:"sticky",top:0,height:"100vh",boxSizing:"border-box",overflowY:"auto"}}>
        <div style={{padding:"2px 7px 12px",borderBottom:"1px solid rgba(255,255,255,0.12)",marginBottom:9}}>
          <div style={{fontSize:12,fontWeight:600,color:"#fff",letterSpacing:"-0.01em"}}>Davies Shelters</div>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.4)",marginTop:1}}>Personal Control Panel</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
          {NAV.map(([l,id])=><button key={id} onClick={()=>setView(id)} style={{background:view===id?"#fff":"rgba(255,255,255,0.1)",color:view===id?B:"rgba(255,255,255,0.85)",border:"none",borderRadius:20,padding:"6px 4px",fontSize:10,fontWeight:view===id?600:400,cursor:"pointer",textAlign:"center",lineHeight:1.2}}>{l}</button>)}
          <button onClick={()=>setView("projects")} style={{gridColumn:"span 2",background:view==="projects"?"#fff":"rgba(255,255,255,0.15)",color:view==="projects"?B:"rgba(255,255,255,0.9)",border:"none",borderRadius:20,padding:"6px 4px",fontSize:10,fontWeight:view==="projects"?600:500,cursor:"pointer",marginTop:3}}>PROJECTS</button>
        </div>
        {activeProj.length>0&&(
          <div style={{marginTop:12,background:"rgba(255,255,255,0.1)",borderRadius:12,padding:"10px 9px"}}>
            <div style={{fontSize:8,fontWeight:700,color:"rgba(255,255,255,0.35)",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:7}}>Active Projects</div>
            {activeProj.slice(0,4).map(p=>{const ps=pst(p.status);return<div key={p.id} onClick={()=>setView("projects")} style={{padding:"4px 3px",cursor:"pointer",borderBottom:"0.5px solid rgba(255,255,255,0.08)",marginBottom:3}}><div style={{fontSize:10,color:"rgba(255,255,255,0.85)",fontWeight:500,lineHeight:1.3,marginBottom:2}}>{p.name}</div><span style={{fontSize:9,background:ps.bg,color:ps.fg,borderRadius:10,padding:"1px 5px",fontWeight:500}}>{ps.l}</span></div>;})}
            {activeProj.length>4&&<div style={{fontSize:9,color:"rgba(255,255,255,0.35)",textAlign:"center",marginTop:3}}>+{activeProj.length-4} more</div>}
          </div>
        )}
        <div style={{flex:1,minHeight:10}}/>
        <div style={{borderTop:"1px solid rgba(255,255,255,0.12)",paddingTop:10}}>
          <div style={{fontSize:8,fontWeight:700,color:"rgba(255,255,255,0.3)",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6,paddingLeft:3}}>Quick Links</div>
          {QL.map(q=><a key={q.l} href={q.u} target="_blank" rel="noopener noreferrer" style={{display:"block",fontSize:10,color:"rgba(255,255,255,0.55)",padding:"4px 5px",cursor:"pointer",textDecoration:"none",borderRadius:4}} onMouseEnter={e=>e.currentTarget.style.color="#fff"} onMouseLeave={e=>e.currentTarget.style.color="rgba(255,255,255,0.55)"}>{q.l} ↗</a>)}
        </div>
      </div>
      <div style={{flex:1,overflow:"auto"}}>
        {view==="home"     &&<HomeView tasks={tasks} projects={projects} streak={streak} energy={energy} setEnergy={setEnergy} painLog={painLog} onLogPain={logPain} onStatus={updStatus} onDelete={delTask} onAdd={addTask}/>}
        {view==="tasks"    &&<TasksView tasks={tasks} projects={projects} onStatus={updStatus} onDelete={delTask} onAdd={addTask}/>}
        {view==="pain"     &&<PainView painLog={painLog} onLogPain={logPain}/>}
        {view==="calendar"&&<CalView events={calEvents} onAddEv={addCalEv} onDelEv={delCalEv}/>}
        {view==="projects" &&<ProjView projects={projects} tasks={tasks} onSave={saveProj} onUpdate={updProj} onStatus={updStatus} onDelete={delTask} onAddTask={addTask}/>}
        {!["home","tasks","pain","projects","calendar"].includes(view)&&<PlaceView label={vLabel}/>}
      </div>
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
